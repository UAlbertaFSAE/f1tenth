services:
  dev:
    container_name: f1tenth_dev
    image:  ualbertaformula/f1tenth
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    environment:
      - DISPLAY=novnc:0.0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - IS_JETSON=FALSE
    volumes:
      - ..:/f1tenth:cached
      - /dev:/dev
    tty: true
    stdin_open: true
    networks:
      - x11

  novnc:
    image: ifrstr/novnc:latest
    environment:
      - RESOLUTION=1600x900
    ports:
      - "6080:6080"
    networks:
      - x11

networks:
  x11:
