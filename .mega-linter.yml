# analyze only our workspace source code
FILTER_REGEX_INCLUDE: .*src/.*

# exclude third-party / generated ROS packages we do not own
FILTER_REGEX_EXCLUDE: >-
  .*src/navigation/(pure_pursuit|particle_filter)(/.*)?
  |.*src/perception/(livox_ros_driver2|zed_wrapper)(/.*)?
  |.*/build/.*
  |.*/install/.*
  |.*/log/.*
  |.*/setup\.py$

# don't re-validate everything on every run
VALIDATE_ALL_CODEBASE: false

DEFAULT_WORKSPACE: .
LINTER_RULES_PATH: .

ENABLE_LINTERS:
  - PYTHON_MYPY
  - PYTHON_RUFF

# use central config file
PYTHON_MYPY_CONFIG_FILE: ./pyproject.toml
PYTHON_RUFF_CONFIG_FILE: ./pyproject.toml

# IMPORTANT: prevent mypy from receiving multiple setup.py files → fixes "Duplicate module setup"
PYTHON_MYPY_ARGUMENTS: "src"
