pure_pursuit:
  ros__parameters:
    odom_topic: "/odom"
    car_refFrame: "laser"
    global_refFrame: "odom"
    drive_topic: "/drive"

    # Pure Pursuit Parameters
    # Lookahead is computed using the following: lookahead = min(max(min_lookahead, max_lookahead * curr_velocity / lookahead_ratio), max_lookahead);
    min_lookahead: 0.5 # for larger track
    max_lookahead: 4.0 # lookahead when the car is going around max velocity
    lookahead_ratio: 4.0 # approximately the max velocity
    K_p: 0.30 # proportional gain for steering control, 0.05 for square track, 0.3 for larger track
    steering_limit: 25.0
    velocity_percentage: 1.0 # the limit, can only do 1 lap with clean tires