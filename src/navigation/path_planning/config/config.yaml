triangulator_node:
  ros__parameters:
    cones_topic: /cone_data
    waypoint_topic: /waypoints
    marker_topic: /triangulation_markers
    frame_id: map

    left_color: blue
    right_color: yellow

    position_tolerance: 0.2
    cluster_distance: 8.0
    min_track_width: 0.4
    max_track_width: 10.0
    qos_depth: 10

    gate_enabled: true
    start_colors: [orange, small_orange]
    stop_colors: [orange, small_orange]
    gate_min_cone_count: 2
    gate_max_distance: 5.0

    stop_distance: 20.0
    extrapolation_step: 1.0
    publish_markers_when_idle: true
