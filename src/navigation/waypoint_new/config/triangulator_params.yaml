triangulator:
  ros__parameters:
    # --- Topics ---
    cones_topic: "/cone_transformed"
    odom_topic: "/odom"
    waypoint_topic: "/waypoints"
    path_topic: "/planned_path"

    # --- Triangulation tuning ---
    lookahead_distance: 4.0
    num_waypoints: 5
    min_track_width: 0.0
    max_track_width: 6.0
    use_spline: true
    spline_samples_per_segment: 6
    spline_min_points: 4
    track_point_min_spacing: 0.5
    track_max_points: 2000
    track_closure_distance: 1.0
    track_min_points_for_loop: 30
    publish_point_count: 20
    publish_spacing: 0.5

    # --- Start gate (orange cones) ---
    use_start_gate: false
    start_gate_max_width: 8.0
    start_colors:
      - "orange"
      - "large_orange"
